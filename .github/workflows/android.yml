name: Build Android (Rust)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev clang

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Configure linker
        run: |
          echo "CC_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV

      - name: Build picoquic (auto via script)
        run: |
          export PICOQUIC_AUTO_BUILD=1

      - name: Build binaries
        run: |
          cargo build --release \
            --target aarch64-linux-android \
            -p slipstream-client \
            -p slipstream-server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-android
          path: |
            target/aarch64-linux-android/release/slipstream-client
            target/aarch64-linux-android/release/slipstream-server
