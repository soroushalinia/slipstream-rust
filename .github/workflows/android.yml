name: Build Android (Rust)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev clang perl make gcc

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Build OpenSSL for Android (aarch64)
        run: |
          OPENSSL_VERSION=3.3.2
          INSTALL_DIR=$(pwd)/openssl-android

          wget -q https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
          tar -xzf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}

          # Important patch for Android + recent OpenSSL (fixes assembly visibility issues)
          sed -i 's/\.hidden OPENSSL_armcap_P/.globl OPENSSL_armcap_P/' crypto/*arm*pl crypto/*/asm/*arm*pl 2>/dev/null || true

          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          ./Configure android-arm64 \
            no-shared no-tests \
            -D__ANDROID_API__=21 \
            --prefix=$INSTALL_DIR \
            --cross-compile-prefix=aarch64-linux-android21-

          make -j$(nproc)
          make install_sw

          echo "OPENSSL_DIR=$INSTALL_DIR" >> $GITHUB_ENV
          echo "AARCH64_LINUX_ANDROID_OPENSSL_DIR=$INSTALL_DIR" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$INSTALL_DIR/include" >> $GITHUB_ENV
          echo "AARCH64_LINUX_ANDROID_OPENSSL_INCLUDE_DIR=$INSTALL_DIR/include" >> $GITHUB_ENV

      - name: Configure Android linker + environment
        run: |
          echo "CC_aarch64_linux_android=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Build picoquic (auto via script)
        run: |
          export PICOQUIC_AUTO_BUILD=1

      - name: Build binaries
        run: |
          cargo build --release \
            --target aarch64-linux-android \
            -p slipstream-client \
            -p slipstream-server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-android
          path: |
            target/aarch64-linux-android/release/slipstream-client
            target/aarch64-linux-android/release/slipstream-server
