name: Build Android (Rust)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev clang perl make gcc

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d   # or r27 if you prefer

      - name: Build OpenSSL for Android (static)
        run: |
          OPENSSL_VERSION=1.1.1w
          INSTALL_DIR=$(pwd)/openssl-android

          wget -q https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
          tar -xzf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}

          sed -i 's/\.hidden OPENSSL_armcap_P/.globl OPENSSL_armcap_P/' crypto/*arm*pl crypto/*/asm/*arm*pl 2>/dev/null || true

          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          ./Configure android-arm64 no-shared no-tests no-asm -D__ANDROID_API__=21 --prefix=$INSTALL_DIR

          make -j$(nproc)
          make install_sw

          echo "OPENSSL_ROOT_DIR=$INSTALL_DIR" >> $GITHUB_ENV
          echo "OPENSSL_DIR=$INSTALL_DIR" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$INSTALL_DIR/include" >> $GITHUB_ENV
          echo "OPENSSL_CRYPTO_LIBRARY=$INSTALL_DIR/lib/libcrypto.a" >> $GITHUB_ENV
          echo "OPENSSL_SSL_LIBRARY=$INSTALL_DIR/lib/libssl.a" >> $GITHUB_ENV
          echo "OPENSSL_USE_STATIC_LIBS=1" >> $GITHUB_ENV

      - name: Build with cargo-ndk
        run: |
          cargo ndk \
            --target aarch64-linux-android \
            --platform 21 \
            build --release \
            -p slipstream-client \
            -p slipstream-server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slipstream-android
          path: |
            target/aarch64-linux-android/release/slipstream-client
            target/aarch64-linux-android/release/slipstream-server
